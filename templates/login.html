{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 120px auto; text-align: center; padding: 40px; background: #ffffff; border: 1px solid #f0f0f0; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);">

    <h2 style="font-weight: 300; text-transform: uppercase; letter-spacing: 4px; font-size: 1rem; color: #1a1a1a; margin-bottom: 30px;">
        Secure Access
    </h2>

    {% if error %}
        <p style="color: #e74c3c; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <div style="margin-bottom: 20px;">
            <input type="password" name="password" placeholder="Enter Administrative Password" required
                   style="width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 2px; font-family: 'Inter', sans-serif; text-align: center; box-sizing: border-box;">
        </div>

        <button type="submit" style="width: 100%; background: #1a1a1a; color: white; padding: 15px; border: none; border-radius: 2px; text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; cursor: pointer; transition: 0.3s;"
                onmouseover="this.style.background='#3498db'" onmouseout="this.style.background='#1a1a1a'">
            Authorize
        </button>
    </form>

    <div style="margin-top: 30px;">
        <a href="/" style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #999; text-decoration: none;">&larr; Return to Terminal</a>
    </div>
</div>
{% endblock %}
